<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>
<link rel="stylesheet" href="login.css">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f4f6f9;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-container{
    width:350px;
    background:#fff;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 15px rgba(0,0,0,0.2);
}

h2{
    text-align:center;
    margin-bottom:20px;
    color:#2c3e50;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    width:100%;
    padding:12px;
    background:#1abc9c;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#16a085;
}

p{
    text-align:center;
    margin-top:15px;
}

a{
    text-decoration:none;
    color:#1abc9c;
}
</style>

</head>
<body>

<div class="login-container">

<h2>Login</h2>

<form action="dashboard.html">

<input type="email" placeholder="Enter Email" required>

<input type="password" placeholder="Enter Password" required>

<button type="submit">Login</button>

</form>

<p>Don't have an account?
<a href="register.html">Register</a>
</p>

</div>

</body>
</html>
