<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logout</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:rgba(0,0,0,0.5);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.logout-box{
    background:#fff;
    width:400px;
    padding:30px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    text-align:center;
}

.logout-box h2{
    color:#2c3e50;
    margin-bottom:15px;
}

.logout-box p{
    color:#555;
    margin-bottom:25px;
    font-size:16px;
}

.buttons{
    display:flex;
    justify-content:center;
    gap:20px;
}

button{
    padding:10px 25px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

.cancel{
    background:#95a5a6;
    color:white;
}

.cancel:hover{
    background:#7f8c8d;
}

.logout{
    background:#e74c3c;
    color:white;
}

.logout:hover{
    background:#c0392b;
}
</style>
</head>

<body>

<div class="logout-box">

<h2>Logout</h2>

<p>Are you sure you want to logout from your profile?</p>

<div class="buttons">

<button class="cancel" onclick="history.back()">
Cancel
</button>

<button class="logout" onclick="window.location.href='login.html'">
Logout
</button>

</div>

</div>

</body>
</html>
